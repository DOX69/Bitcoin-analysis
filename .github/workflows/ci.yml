name: "CI/CD Pipeline"

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - staging
      - main

jobs:
  test_package:
    name: "📥 Backend Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./dbx_workflow

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install uv
          uv sync --extra dev

      - name: Run Backend Tests
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: uv run pytest

  test_app:
    name: "🧪 Frontend Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Components Tests
        run: npm test -- --ci --watchAll=false

  deploy:
    name: "🚀 Deploy to Databricks"
    runs-on: ubuntu-latest
    needs: [test_package, test_app]
    if: |
      (github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'staging')) ||
      (github.event_name == 'pull_request' && (github.base_ref == 'staging' || github.base_ref == 'main'))
    timeout-minutes: 15
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: databricks/setup-cli@main

      - name: 📦 Install uv
        run: pip install uv

      - name: 🔑 Configure Databricks CLI
        run: |
          mkdir -p ~/.databricks
          cat > ~/.databrickscfg << 'EOF'
          [PROD]
          host = ${{ secrets.DATABRICKS_HOST }}
          token = ${{ secrets.DATABRICKS_TOKEN }}
          EOF

      - name: ✅ Validate bundle syntax
        run: databricks bundle validate -t prod -p PROD

      - name: 🚀 Deploy to PROD
        run: databricks bundle deploy -t prod -p PROD

      - name: 🏃‍♀️‍➡️ Run databricks master job
        if: github.ref_name == 'staging' || github.base_ref == 'staging'
        run: databricks bundle run -t prod -p PROD master_orchestrator_job

  promote_to_main:
    name: "🔄 Promote Staging to Main"
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.event_name == 'push' && github.ref_name == 'staging'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fast-forward main to staging
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main staging
          git checkout main
          git merge --ff-only origin/staging
          git push origin main
  deploy_dev:
    name: "🚀 Deploy to Databricks (dev)"
    runs-on: ubuntu-latest
    needs: [test_package, test_app]
    if: github.event_name == 'push' && !(github.ref_name == 'main' || github.ref_name == 'staging')
    timeout-minutes: 15
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - name: 📦 Install uv
        run: pip install uv
      - name: 🔑 Configure Databricks CLI
        run: |
          mkdir -p ~/.databricks
          cat > ~/.databrickscfg << 'EOF'
          [DEFAULT]
          host = ${{ secrets.DATABRICKS_HOST }}
          token = ${{ secrets.DATABRICKS_TOKEN }}
          EOF
      - name: ✅ Validate bundle syntax (dev)
        run: databricks bundle validate -t dev -p DEFAULT
      - name: 🚀 Deploy to DEV
        run: databricks bundle deploy -t dev -p DEFAULT
      - name: 🏃‍♀️‍➡️ Run databricks master job (dev)
        run: databricks bundle run -t dev -p DEFAULT master_orchestrator_job
